<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — AuthApp</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-dot"></div>
      <span class="brand-name">AuthApp</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to access your account.</p>

    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" />
    </div>
    <button onclick="login()" id="btn">Sign in</button>

    <div id="alert" class="alert"></div>

    <div class="link-row">
      Don't have an account? <a href="register.html">Create one</a>
    </div>
  </div>

  <script>
    function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const alert = document.getElementById('alert');
      const btn = document.getElementById('btn');
      alert.className = 'alert';

      if (!email || !password) {
        showAlert('error', 'Please fill in all fields.');
        return;
      }

      const users = JSON.parse(localStorage.getItem('users') || '[]');
      const user = users.find(u => u.email === email);

      if (!user || user.password !== btoa(password)) {
        showAlert('error', 'Invalid email or password.');
        return;
      }

      // Store logged-in user session
      sessionStorage.setItem('loggedInUser', JSON.stringify({ username: user.username, email: user.email }));
      showAlert('success', 'Login successful! Redirecting…');
      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    }

    function showAlert(type, msg) {
      const el = document.getElementById('alert');
      el.className = 'alert ' + type;
      el.textContent = msg;
    }

    // Allow Enter key
    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
