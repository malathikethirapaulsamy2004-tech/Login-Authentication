<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — AuthApp</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { align-items: flex-start; padding: 40px 24px; }

    .dashboard {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      animation: fadeUp 0.4s ease both;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }

    .logout-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      width: auto;
      margin: 0;
    }

    .logout-btn:hover { border-color: var(--error); color: var(--error); }

    .welcome-card {
      background: var(--accent);
      border-radius: 20px;
      padding: 36px;
      color: #fff;
      margin-bottom: 24px;
    }

    .welcome-card .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.7;
      margin-bottom: 8px;
    }

    .welcome-card h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      font-weight: 400;
      letter-spacing: -0.5px;
    }

    .welcome-card p {
      margin-top: 10px;
      opacity: 0.8;
      font-size: 14px;
      line-height: 1.6;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .info-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .info-tile .tile-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .info-tile .tile-value {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      word-break: break-all;
    }

    .secure-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 99px;
      margin-top: 20px;
    }

    .dot-green {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="top-bar">
      <div class="brand">
        <div class="brand-dot"></div>
        <span class="brand-name">AuthApp</span>
      </div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>

    <div class="welcome-card">
      <div class="label">Secured Area</div>
      <h2 id="welcomeText">Hello!</h2>
      <p>You've successfully authenticated. This page is only accessible to logged-in users.</p>
    </div>

    <div class="info-grid">
      <div class="info-tile">
        <div class="tile-label">Username</div>
        <div class="tile-value" id="displayUsername">—</div>
      </div>
      <div class="info-tile">
        <div class="tile-label">Email</div>
        <div class="tile-value" id="displayEmail">—</div>
      </div>
    </div>

    <div class="secure-badge">
      <div class="dot-green"></div>
      JWT Authenticated Session
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = '/'; }

    async function loadDashboard() {
      try {
        const res = await fetch('/api/dashboard', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!res.ok) {
          localStorage.clear();
          window.location.href = '/';
          return;
        }

        const data = await res.json();
        document.getElementById('welcomeText').textContent = `Hello, ${data.user.username}!`;
        document.getElementById('displayUsername').textContent = data.user.username;
        document.getElementById('displayEmail').textContent = data.user.email;
      } catch {
        window.location.href = '/';
      }
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/';
    }

    loadDashboard();
  </script>
</body>
</html>
