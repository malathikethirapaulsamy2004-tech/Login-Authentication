<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — AuthApp</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-dot"></div>
      <span class="brand-name">AuthApp</span>
    </div>

    <h1>Create account</h1>
    <p class="subtitle">Join us — it only takes a moment.</p>

    <form id="registerForm">
      <div class="form-group">
        <label for="username">Full name</label>
        <input type="text" id="username" placeholder="Your name" required />
      </div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" required minlength="6"/>
      </div>
      <div class="form-group">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" placeholder="Repeat your password" required />
      </div>
      <button type="submit" id="btn">Create account</button>
    </form>

    <div id="alert" class="alert"></div>

    <div class="link-row">
      Already have an account? <a href="/">Sign in</a>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const alert = document.getElementById('alert');
      alert.className = 'alert';

      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (password !== confirm) {
        alert.className = 'alert error';
        alert.textContent = 'Passwords do not match.';
        return;
      }

      btn.textContent = 'Creating account…';
      btn.disabled = true;

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();

        if (res.ok) {
          alert.className = 'alert success';
          alert.textContent = 'Account created! Redirecting to login…';
          setTimeout(() => window.location.href = '/', 1500);
        } else {
          alert.className = 'alert error';
          alert.textContent = data.message;
          btn.textContent = 'Create account';
          btn.disabled = false;
        }
      } catch {
        alert.className = 'alert error';
        alert.textContent = 'Server error. Please try again.';
        btn.textContent = 'Create account';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
